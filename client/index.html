<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Badam's Cafe</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

header {
  display: flex;
  align-item: center;
  justify-content: center;
  gap: 10px;
  background-color: #0b6b3a;
  color: white;
  padding: 15px;
}
.container {
  width: 60%;
  margin: auto;
  margin-top: 20px;
}
.card {
  background: white;
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 10px;
}
button {
  background: #0b6b3a;
  color: white;
  border: none;
  padding: 6px 10px;
  border-radius: 5px;
  cursor: pointer;
  margin-left: 5px;
}
.delete-btn {
  background: red;
}
input, select {
  padding: 8px;
  margin-right: 10px;
}

.row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<header>
  <img src="https://upload.wikimedia.org/wikipedia/en/thumb/d/d3/Starbucks_Corporation_Logo_2011.svg/120px-Starbucks_Corporation_Logo_2011.svg.png"
       style="width:40px; height:40px; border-radius:50%;">
  <h1 style="margin:0;">Badam's Cafe</h1>
</header>

<div class="container">
<div class="card">
  <h2>Add Menu Item</h2>
  <input id="name" placeholder="Item name">
  <input id="price" placeholder="Price">
  <input id="category" placeholder="Category">
  <button onclick="addItem()">Add Item</button>
</div>

<div class="card">
  <h2>Menu</h2>
  <div id="menu"></div>
</div>
  
<div class="card">
  <h2>Create Order</h2>
  <select id="menuSelect"></select>
  <input id="quantity" placeholder="Quantity">
  <button onclick="createOrder()">Create Order</button>
</div>

<div class="card">
  <h2>Orders</h2>
  <div id="orders"></div>
</div>

</div>
<script>  
let menu = [];
let orders = [];

// Add menu item + clear inputs
function addItem() {
  const nameInput = document.getElementById("name");
  const priceInput = document.getElementById("price");
  const categoryInput = document.getElementById("category");

  const name = nameInput.value;
  const price = priceInput.value;
  const category = categoryInput.value;

  if (!name || !price || !category) return;

  menu.push({
    id: Date.now(),
    name,
    price: Number(price),
    category
  });

renderMenu();

//  clear inputs
  nameInput.value = "";
  priceInput.value = "";
  categoryInput.value = "";
  nameInput.focus();
}

// Edit menu item
function editItem(id) {
  const item = menu.find(m => m.id == id);

  const newName = prompt("Edit name:", item.name);
  const newPrice = prompt("Edit price:", item.price);
  const newCategory = prompt("Edit category:", item.category);

  if (!newName || !newPrice || !newCategory) return;

  item.name = newName;
  item.price = Number(newPrice);
  item.category = newCategory;

  renderMenu();
}

// Delete menu item + remove related orders
function deleteItem(id) {
  menu = menu.filter(m => m.id != id);
  orders = orders.filter(o => o.itemId != id);

  renderMenu();
  renderOrders();
}

// Render menu
function renderMenu() {
  const menuDiv = document.getElementById("menu");
  const select = document.getElementById("menuSelect");

  menuDiv.innerHTML = "";
  select.innerHTML = "";

  menu.forEach(item => {
    menuDiv.innerHTML += `
      <div class="row">
        <span>${item.name} (€${item.price}) - <b>${item.category}</b></span>
        <div>
          <button onclick="editItem(${item.id})">Edit</button>
          <button class="delete-btn" onclick="deleteItem(${item.id})">Delete</button>
        </div>
      </div>
    `;

    select.innerHTML += `<option value="${item.id}">${item.name}</option>`;
  });
}

// Create order + clear quantity
function createOrder() {
  const itemId = document.getElementById("menuSelect").value;
  const quantityInput = document.getElementById("quantity");
  const quantity = quantityInput.value;

  if (!itemId || !quantity) return;

  const item = menu.find(m => m.id == itemId);

  orders.push({
    id: Date.now(),
    itemId: item.id,
    item: item.name,
    quantity: Number(quantity),
    total: item.price * quantity,
    status: "Preparing"
  });

  renderOrders();

  // clear quantity field
  quantityInput.value = "";
}

// Update order status
function updateStatus(id, status) {
  const order = orders.find(o => o.id == id);
  order.status = status;
  renderOrders();
}

// Render orders
function renderOrders() {
  const div = document.getElementById("orders");
  div.innerHTML = "";

  
  orders.forEach(o => {
    const color = o.status === "Completed" ? "green" : "orange";

    div.innerHTML += `
      <div class="row">
        <span>
          Order #${o.id} - ${o.item} x${o.quantity} (€${o.total})
        </span>

        <div>
          <select onchange="updateStatus(${o.id}, this.value)">
            <option ${o.status==="Preparing"?"selected":""}>Preparing</option>
            <option ${o.status==="Completed"?"selected":""}>Completed</option>
          </select>

          <span style="margin-left:10px; color:${color}; font-weight:bold;">
            ${o.status}
          </span>
        </div>
      </div>
    `;
  });
}
</script>

</body>
</html>
